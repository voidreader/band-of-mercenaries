name: Sync CHANGELOG to HeartCode-Board

on:
  push:
    branches:
      - main
    paths:
      - 'Docs/CHANGELOG.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout band-of-mercenaries
        uses: actions/checkout@v4

      - name: Checkout HeartCode-Board
        uses: actions/checkout@v4
        with:
          repository: voidreader/HeartCode-Board
          token: ${{ secrets.HEARTCODE_BOARD_PAT }}
          path: HeartCode-Board

      - name: Copy CHANGELOG
        run: |
          cp Docs/CHANGELOG.md HeartCode-Board/src/content/docs/band-of-mercenaries/changelog.md

      - name: Commit and push if changed
        working-directory: HeartCode-Board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/band-of-mercenaries/changelog.md
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "chore(content): sync band-of-mercenaries changelog"
            git push
          fi
